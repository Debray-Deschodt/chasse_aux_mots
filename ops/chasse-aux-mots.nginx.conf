# /etc/nginx/sites-available/chasse-aux-mots
# Lien : sudo ln -s /etc/nginx/sites-available/chasse-aux-mots /etc/nginx/sites-enabled/
#
# Ce fichier ne contient QUE les blocs HTTP (port 80). Certbot ajoutera tout seul
# les blocs 443 + le certificat + la redirection HTTP->HTTPS quand tu lanceras :
#
#   sudo certbot --nginx -d chasse-aux-mots.fr -d www.chasse-aux-mots.fr -d staging.chasse-aux-mots.fr
#
# (un seul certificat couvrira les trois noms). Pense à : DNS A staging -> ton IP,
# et port 443 ouvert.

# ---------- PROD : chasse-aux-mots.fr ----------
server {
    listen 80;
    listen [::]:80;
    server_name chasse-aux-mots.fr;

    # compression (le HTML du jeu fait ~1 Mo)
    gzip on;
    gzip_proxied any;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- WWW : redirige vers l'apex ----------
server {
    listen 80;
    listen [::]:80;
    server_name www.chasse-aux-mots.fr;
    return 301 https://chasse-aux-mots.fr$request_uri;
}

# ---------- STAGING : staging.chasse-aux-mots.fr ----------
server {
    listen 80;
    listen [::]:80;
    server_name staging.chasse-aux-mots.fr;

    gzip on;
    gzip_proxied any;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- Optionnel : protéger staging par mot de passe ---
    #   sudo apt install apache2-utils
    #   sudo htpasswd -c /etc/nginx/.htpasswd-staging paul
    # puis décommente les deux lignes :
    # auth_basic "Staging - acces restreint";
    # auth_basic_user_file /etc/nginx/.htpasswd-staging;

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
